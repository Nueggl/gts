<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Guess the Song!</h1>

    <div id="player-container">
        <img id="cover-art" src="" alt="Album Cover" class="hidden">
        <div id="curtain">🎵 Musik lädt...</div>
    </div>

    <div id="game-controls">
        <p id="status">Klicke Start um zu beginnen</p>
        <button id="start-btn" onclick="startGame()">Runde Starten</button>
        
        <div id="guess-area" class="hidden">
            <input type="text" id="guess-input" placeholder="Wie heißt der Song?">
            <button onclick="checkAnswer()">Raten</button>
            <button onclick="reveal()">Auflösen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
